<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Under Maintenance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }

    .icon {
      font-size: 50px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #f59e0b;
      color: #000;
      font-weight: 600;
      font-size: 14px;
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 500px) {
      .container {
        margin: 20px;
        padding: 25px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">🚧</div>

    <h1>Temporarily offline</h1>
    <p>
      Our website is currently undergoing maintenance.<br />
    </p>

    <div class="status">Maintenance Mode</div>

    <div class="footer">
      © 2026 Vibron
    </div>
  </div>
</body>
</html>
