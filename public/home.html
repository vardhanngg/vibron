<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vibron — music that matches your mood" />
  <meta name="theme-color" content="#7c5cfc" />
  <link rel="manifest" href="/manifest.json" />
  <title>Vibron</title>
  <link rel="icon" type="image/x-icon" href="/v.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Space+Grotesk:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #ff4fa3;
      --accent-2: #7c5cfc;
      --accent-3: #00e5ff;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Outfit', sans-serif;
      background: #0a0a12;
      color: #f0f0ff;
    }

    /* Animated mesh background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: #0a0a12;
      overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.6;
      animation: drift linear infinite;
    }
    .b1 { width: 500px; height: 500px; background: var(--accent-2); top: -10%; left: -10%; animation-duration: 20s; }
    .b2 { width: 400px; height: 400px; background: var(--accent); top: 50%; right: -5%; animation-duration: 25s; animation-delay: -8s; }
    .b3 { width: 350px; height: 350px; background: var(--accent-3); bottom: -10%; left: 30%; animation-duration: 18s; animation-delay: -5s; opacity: 0.3; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 30px) scale(0.98); }
      75% { transform: translate(40px, 20px) scale(1.03); }
    }

    /* Noise overlay */
    .noise {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed; inset: 0; z-index: 2;
      background: rgba(10, 10, 18, 0.45);
      backdrop-filter: blur(0px);
    }

    /* Content */
    .content {
      position: relative; z-index: 3;
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1s cubic-bezier(.4,0,.2,1);
    }

    /* Logo + title */
    .hero-logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(124,92,252,0.4), 0 0 0 1px rgba(255,255,255,0.08);
      animation: logoBob 3s ease-in-out infinite;
    }
    @keyframes logoBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #c8b4ff 40%, var(--accent) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.35rem);
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.5px;
      margin-bottom: 3rem;
      max-width: 420px;
    }

    /* Mode cards */
    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-card {
      position: relative;
      width: 200px;
      padding: 2rem 1.5rem;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .mode-card::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.3s;
    }
    .card-mood::before { background: linear-gradient(135deg, rgba(255,79,163,0.2), rgba(124,92,252,0.2)); }
    .card-normal::before { background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,92,252,0.2)); }

    .mode-card:hover {
      transform: translateY(-8px) scale(1.03);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .mode-card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 2.5rem; margin-bottom: 0.75rem;
      display: block; line-height: 1;
    }
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .card-desc {
      font-size: 0.82rem; color: rgba(255,255,255,0.5);
      line-height: 1.4;
    }

    /* Bottom pill */
    .bottom-pill {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 0.78rem; color: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    .bottom-pill span { color: rgba(255,255,255,0.7); font-weight: 600; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .cards { flex-direction: column; align-items: center; }
      .mode-card { width: 85vw; max-width: 280px; }
    }
  </style>
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WDTWCSMN" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="noise"></div>
  <div class="overlay"></div>

  <div class="content">
    <img src="/v.ico" alt="Vibron" class="hero-logo" />
    <h1>Vibron</h1>
    <p class="tagline">Music that matches your mood, your moment, your vibe.</p>

    <div class="cards">
      <a href="/mood" class="mode-card card-mood">
        <span class="card-icon">🎭</span>
        <div class="card-title">Mood Player</div>
        <div class="card-desc">Let your face pick the music. Camera-powered mood detection.</div>
      </a>
      <a href="/normal" class="mode-card card-normal">
        <span class="card-icon">🎵</span>
        <div class="card-title">Normal Player</div>
        <div class="card-desc">Search, queue, favorites & listen together with friends.</div>
      </a>
    </div>
  </div>

  <div class="bottom-pill">Press <span>Space</span> to play · <span>N</span> next · <span>←→</span> seek</div>
</body>
</html>
